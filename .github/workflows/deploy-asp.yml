name: Deploy ASP

on:
  push:
    branches: [main]

jobs:
  deploy:
    name: Deploy ASP to Fly.io
    runs-on: ubuntu-latest
    concurrency:
      group: deploy-asp
      cancel-in-progress: true
    steps:
      - uses: actions/checkout@v4

      - uses: superfly/flyctl-actions/setup-flyctl@master

      - run: flyctl deploy --config fly.toml --dockerfile Dockerfile --app zylith-asp
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
